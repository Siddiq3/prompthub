<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PhotoPromptsHub helps creators discover the latest AI photo prompts, prompt collections, and example images for Midjourney, DALL·E, Flux, and Stable Diffusion."
    />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("theme");
          var theme = storedTheme || "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (error) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <title>PhotoPromptsHub</title>
  </head>
  <body class="bg-site font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
