<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PhotoPromptsHub helps creators discover the latest AI photo prompts, prompt collections, and example images for Midjourney, DALL·E, Flux, and Stable Diffusion."
    />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=20260311" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/site-icon.svg?v=20260311" />
    <link rel="shortcut icon" href="/favicon-32.png?v=20260311" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260311" />
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      as="style"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("theme");
          var theme = storedTheme || "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (error) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <title>PhotoPromptsHub</title>
  </head>
  <body class="bg-site font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
